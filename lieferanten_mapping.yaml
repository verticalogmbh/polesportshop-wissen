# ============================================================================
# Schema-Dokumentation
# ============================================================================
#
# Jeder Lieferant ist ein Mapping unter `lieferanten:` mit eindeutigem Key
# (Konvention: NAME_OHNE_LEERZEICHEN_UND_BINDESTRICHE in Großbuchstaben).
#
# Pflichtfelder (Cowork bricht ab, wenn null):
#   anzeigename             — Voller Name wie im Trigger gesprochen
#   kuerzel                 — Für Dateinamen (z.B. POLE-ADDICT)
#   hersteller              — Marken-/Herstellername für Stammdaten (lange Form, z.B. „HotCakes Polewear")
#   marke_kurz              — NEU v1.12 (E70-Lehrpunkt). Kurzform für Artikelnamen (Goldstandard-Konvention),
#                              z.B. „HotCakes". Wenn keine kürzere Form existiert: identisch zu `hersteller`.
#                              Pflichtfeld ab v1.12; Cowork bricht ab und fragt nach wenn null.
#   brand_story_de/en/fr/it/es  — NEU v1.13 (E72). Brand-Story pro Lieferant in allen 5 Sprachen,
#                              ~80-150 Wörter, in polesportshop-DNA-Ton (E74-aspirational).
#                              Wenn gepflegt: Cowork verwendet sie 1:1 als `markentext`-Attribut.
#                              Wenn null: Cowork generiert pro Lauf, markiert als E70.
#                              Pflege beim Onboarding eines neuen Lieferanten durch Tjorben.
#   herkunftsland           — ISO-2-Code für WaWi (PT, GR, DE, US, ...)
#   waehrung                — ISO-3-Code (EUR, USD, GBP)
#   steuerklasse            — JTL-Steuerklassen-Anzeigename. Default für
#                              Kleidung-Pilot: "OSS2-undefiniert - Standard
#                              alle Länder". Bei Technik später anpassen.
#   shop_url                — Primäre Crawl-Quelle (Hersteller bevorzugt, siehe E20)
#   r2_prefix               — Bucket-Pfad-Prefix in Cloudflare R2
#                              (verarbeitete Bilder unter `<r2_prefix>/...`,
#                              Originale unter `originals/<r2_prefix>/...`, E44)
#   ameise_vorlagen.stammdaten — Vorlagenname für Stammdaten-Import inkl. Bildern
#
# Crop-Profile und Pose-Sortierung (NEU mit E45, Defaults bei null):
#   category                — Informativ. Werte: "fashion" | "tech"
#                              Default: "fashion" (häufigster Fall im Pilot)
#   crop_profile            — Auswahl der Bildverarbeitungsparameter
#                              Werte: "fashion" (2:3, 1000×1500, top_bias 0.3)
#                                     "tech"    (1:1, 1200×1200, top_bias 0.0)
#                              Default: "fashion"
#   pose_sort               — Strategie für Bild-Reihenfolge
#                              Werte: "auto_vision"        (Cowork-Vision klassifiziert,
#                                                            sortiert Hero/Back/Side/...)
#                                     "manufacturer_order" (Hersteller-Reihenfolge ist
#                                                            verlässlich, z.B. semantische
#                                                            URL-Namen wie _1_front.jpg)
#                                     "none"               (zufällig, OK für tech)
#                              Default: "auto_vision" für fashion, "none" für tech
#
# Stammdaten-Defaults (NEU v1.16, F3+F6):
#   article_weight_kg       — Default-Artikelgewicht in kg für Stammdaten-CSV
#                              Spalten `Artikelgewicht` und `Versandgewicht`.
#                              Pilot-Default Pole-Bekleidung: 0.05 (50 g pro
#                              Kleidungsstück). Pro Artikel ggf. override wenn
#                              echtes Gewicht aus Lieferanten-Daten bekannt.
#                              Wert bleibt in YAML als Float (0.05). In der
#                              CSV als DE-Locale-Komma `0,05` schreiben.
#                              Quelle: F3-Klärung Tjorben 2026-05-18 (B56).
#   taric_code              — TARIC-Code für deutsche Zoll-Anmeldung,
#                              landet in Stammdaten-CSV-Spalte `TARIC`
#                              (Sonstiges-Reiter in WaWi).
#                              Pilot-Default Pole-Bekleidung: '62114390'.
#                              YAML als String mit führender Null-Sicherheit
#                              quoten, sonst interpretiert YAML als Int.
#                              Quelle: F6-Klärung Tjorben 2026-05-18 (B59).
#
# Optional (Cowork läuft auch ohne):
#   fallback_retailer_url   — Wenn Hersteller-Site unvollständig
#   drive_ordner_id         — Lieferanten-Hauptordner (für Drive-Quellen)
#   drive_eingang_id        — _Eingang-Unterordner für manuelle Bild-Uploads
#   lieferantennummer_wawi  — WaWi-interne Lieferantennummer
#   groessen_konvention     — Lieferanten-spezifische Größen-Logik
#                              Werte: "standard" (jede Größe einzeln),
#                                     "kombi_reduziert_auf_kleinste" (XS/S→XS,
#                                       gemäß E27 für HotCakes etabliert)
#   max_groesse             — NEU v1.15. Optionales Default-Größen-Cap pro Lieferant.
#                              null = alle Größen aus Quell-Crawl übernehmen.
#                              Werte: "S" | "M" | "L" | "XL" | "XXL" | null
#                              Bei gesetztem Wert wird im Standard-Trigger nur bis
#                              inklusive dieser Obergrenze angelegt. Einzelne
#                              Trigger können den Wert override-en. Hintergrund:
#                              manche Lieferanten produzieren über L hinaus mit
#                              wechselnder Verfügbarkeit, Tjorben will pro
#                              Lieferant ein Default-Limit setzen können.
#
# Ameise-Vorlagen pro Lieferant (5 Vorlagen ab v1.14 nach E80):
#   ameise_vorlagen.stammdaten    — Stammdaten-Import inkl. Lieferantenblock (E36)
#                                    UND inkl. Bild-Spalten Bild 1 bis Bild 10 (E46);
#                                    Reiter "Bilder/Plattformen" mit allen 11
#                                    Plattform-Häkchen setzen (löst B5)
#   ameise_vorlagen.variationen   — Sprach-Varianten Größe
#   ameise_vorlagen.merkmale      — Filter-Merkmale
#   ameise_vorlagen.attribute     — Reichtext-Attribute (Standard ab E39)
#   ameise_vorlagen.cross_selling — NEU v1.14 (E80). Cross-Selling-Artikel-Import (eigener Ameise-Import-Typ),
#                                    3 Spalten: Artikelnummer + Artikelnummer Cross-Seller + Cross-Selling-Gruppe.
#                                    Pflichtfeld ab v1.14 — Cowork bricht ab und fragt nach, wenn null.
#
# Naming-Konvention (ab 2026-05-14, E29; ab v1.14 E80 5 statt 4 Felder):
#   `{Lieferantenname}_{Reihenfolge}_{Import-Typ}`,
#   z.B. `HotCakes Polewear_1_Stammdaten`.
#   Underscores als Element-Trenner, Leerzeichen nur innerhalb des
#   Lieferantennamens. POLE ADDICT folgt noch alter Konvention — nicht
#   umbenennen, alte Vorlagen funktionieren.
#
# Slot-Konvention pro Import-Typ (klargestellt v1.15):
#   Slot-Nummern im Vorlagennamen sind **pro Import-Typ eindeutig**, nicht
#   lieferanten-weit. Konsequenz:
#     - `HotCakes Polewear_3_Merkmale`        (Merkmale-Import-Typ)
#     - `HotCakes Polewear_3_Lieferantendaten` (Stammdaten-Import-Typ, Legacy)
#     - `HotCakes Polewear_5_Bilder`          (Stammdaten-Import-Typ, Legacy)
#     - `HotCakes Polewear_5_CrossSelling`    (Cross-Selling-Import-Typ)
#   Die `_3_` und `_5_` kollidieren NICHT, weil WaWi Vorlagen pro Import-Typ
#   trennt. Daher kann der jeweilige Slot in beiden Import-Typen unabhängig
#   belegt sein. Empfohlene Slot-Reihenfolge pro Lieferant (alle Vorlagen
#   neu angelegt): `_1_Stammdaten`, `_2_Variationen`, `_3_Merkmale`,
#   `_4_Attribute`, `_5_CrossSelling`. Bei Legacy-Vorlagen (POLE ADDICT,
#   HotCakes Bilder/Lieferantendaten) bleibt die alte Slot-Belegung
#   bestehen, neue Vorlagen folgen der Konvention.
#
# Standardlieferant in jeder Vorlage (Pflicht, klargestellt v1.15 nach Bug):
#   In jeder der 5 Ameise-Vorlagen pro Lieferant MUSS im Standardwerte-
#   Bereich der Wert "Lieferant" explizit auf den Lieferanten gesetzt sein
#   (z.B. "HotCakes Polewear"). Ohne Standardlieferanten scheitert der
#   Import wenn die CSV-Lieferanten-Spalte aus irgendeinem Grund nicht
#   greift. Bug-Beleg: HotCakes-Attribute-Import 2026-05-17 schlug initial
#   mit 220 Warnungen "Lieferant HOTCAKES existiert nicht" fehl, weil die
#   neu angelegte `_4_Attribute`-Vorlage den Standardlieferanten auf
#   "nicht gewählt" hatte.
#
# Legacy-Vorlagen (pro Lieferant optional unter `legacy_vorlagen.{name}`):
#   Vorlagen, die in WaWi existieren aber in der aktuellen Pipeline nicht
#   mehr genutzt werden. Dokumentation, nicht Anweisung. Beispiele:
#     lieferantendaten  — durch Lieferantenblock in Stammdaten ersetzt (E35)
#     bilder            — durch Bild-Spalten in Stammdaten ersetzt (E46)
#
# Sonstige optionale Felder:
#   bemerkung            — Freitext-Hinweise (Stand, Besonderheiten)
#
# Wert null bedeutet: noch nicht gepflegt. Cowork hält an und fragt nach,
# bevor der Lauf scheitert. Werte "TBD" oder "<später>" bitte vermeiden —
# null ist eindeutiger.
#
# Bei Schema-Änderung (neue Pflichtfelder o.ä.): Cowork-Anweisungen
# datenimports + bildpipeline mit anpassen, beide referenzieren dieses File.
