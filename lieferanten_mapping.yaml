# Lieferanten-Mapping — Single Source of Truth
#
# Diese Datei ist die einzige Quelle für Lieferanten-Metadaten in der Pipeline.
# Beide Cowork-Anweisungen (datenimports + bildpipeline) lesen aus dieser Datei,
# pflegen sie aber nicht selbst — Updates kommen ausschließlich von Tjorben /
# über den Projekt-Wissens-Update-Prozess.
#
# Wenn ein Lieferant noch nicht im Mapping ist und ein Lauf gestartet wird,
# hält Cowork an und fragt nach den fehlenden Werten.
#
# Schema-Dokumentation siehe Abschnitt am Ende dieser Datei.
#
# Stand: 2026-05-18 (v1.16 — F3 + F6 aus HotCakes-Run-Report 2026-05-18: zwei neue
# Pflicht-Felder pro Lieferant — `article_weight_kg` (Default 0.05 = 50 g pro
# Kleidungsstück, F3/B56) und `taric_code` (Default '62114390' für Pole-Bekleidung,
# F6/B59). Beide Felder als Lieferanten-Override-fähig, mit Default-Hinweis im
# Schema-Block am Ende dieser Datei.
# Vorheriger Stand: 2026-05-17 (v1.15 — Onboarding-Erweiterungen nach Live-Trial-Runs
# Batch 1+2 HotCakes: Vorlagen-Slots final gesetzt (E80-Erweiterung), Feld
# `max_groesse` als Default-Größen-Cap pro Lieferant, Schema-Doku
# um Vorlagen-Slot-Konvention pro Import-Typ klargestellt.
# Vor-vorheriger Stand: 2026-05-15 (Architektur-Pivot beim Bilder-Import auf
# Stammdaten-Integration, siehe E46: Ameise-Vorlagen pro Lieferant von 5
# auf 4 reduziert; mit E80 v1.14 wieder auf 5 erweitert um Cross-Selling)

