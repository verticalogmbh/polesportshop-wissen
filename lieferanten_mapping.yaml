    brand_story_en: |
      Pole Addict, and the people behind it, are just as devoted to pole dance
      and pole fitness as you are. The brand's goal is to offer beautiful,
      colourful and hard-wearing clothing at affordable prices that keeps up
      with every pole move. Pole Addict's pole dance wear is created so that
      every woman feels good in it. The designs win you over with fascinating
      patterns, bold colours and their huge mix-and-match variety. Anyone
      looking for extraordinary polewear at fair prices will be sure to find it
      here.
    brand_story_fr: |
      Pole Addict, et les personnes derrière la marque, sont aussi passionnées
      de pole dance et de pole fitness que toi. L'objectif de la marque est de
      proposer des vêtements beaux, colorés et résistants à des prix
      abordables, qui suivent chaque mouvement de pole. Les vêtements de pole
      dance de Pole Addict sont conçus pour que chaque femme s'y sente bien.
      Les designs séduisent par des motifs fascinants, des couleurs vives et
      leur grande variété de combinaisons. Quiconque cherche une polewear
      hors du commun à des prix justes la trouvera assurément ici.
    brand_story_it: |
      Pole Addict, e le persone dietro al marchio, sono appassionate di pole
      dance e pole fitness proprio come te. L'obiettivo del marchio è offrire
      abbigliamento bello, colorato e resistente a prezzi accessibili, che
      assecondi ogni movimento di pole. L'abbigliamento da pole dance di Pole
      Addict è creato perché ogni donna si senta a proprio agio. I design
      conquistano con motivi affascinanti, colori intensi e la loro grande
      versatilità di abbinamento. Chi cerca polewear fuori dal comune a prezzi
      onesti la troverà sicuramente qui.
    brand_story_es: |
      Pole Addict, y las personas detrás de la marca, están tan entregadas al
      pole dance y al pole fitness como tú. El objetivo de la marca es ofrecer
      ropa bonita, colorida y resistente a precios asequibles, que acompañe
