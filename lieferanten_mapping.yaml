# ============================================================================
# Schema-Dokumentation
# ============================================================================
#
# Jeder Lieferant ist ein Mapping unter `lieferanten:` mit eindeutigem Key
# (Konvention: NAME_OHNE_LEERZEICHEN_UND_BINDESTRICHE in Großbuchstaben).
#
# Pflichtfelder (Cowork bricht ab, wenn null):
#   anzeigename             — Voller Name wie im Trigger gesprochen
#   kuerzel                 — Für Dateinamen (z.B. POLE-ADDICT)
#   hersteller              — Marken-/Herstellername für Stammdaten (lange Form, z.B. „HotCakes Polewear")
#   marke_kurz              — NEU v1.12 (E70-Lehrpunkt). Kurzform für Artikelnamen (Goldstandard-Konvention),
#                              z.B. „HotCakes". Wenn keine kürzere Form existiert: identisch zu `hersteller`.
#                              Pflichtfeld ab v1.12; Cowork bricht ab und fragt nach wenn null.
#   brand_story_de/en/fr/it/es  — NEU v1.13 (E72). Brand-Story pro Lieferant in allen 5 Sprachen,
#                              ~80-150 Wörter, in polesportshop-DNA-Ton (E74-aspirational).
#                              Wenn gepflegt: Cowork verwendet sie 1:1 als `markentext`-Attribut.
#                              Wenn null: Cowork generiert pro Lauf, markiert als E70.
#                              Pflege beim Onboarding eines neuen Lieferanten durch Tjorben.
#   herkunftsland           — ISO-2-Code für WaWi (PT, GR, DE, US, ...)
#   waehrung                — ISO-3-Code (EUR, USD, GBP)
#   steuerklasse            — JTL-Steuerklassen-Anzeigename. Default für
#                              Kleidung-Pilot: "OSS2-undefiniert - Standard
#                              alle Länder". Bei Technik später anpassen.
#   shop_url                — Primäre Crawl-Quelle (Hersteller bevorzugt, siehe E20)
#   r2_prefix               — Bucket-Pfad-Prefix in Cloudflare R2
#                              (verarbeitete Bilder unter `<r2_prefix>/...`,
#                              Originale unter `originals/<r2_prefix>/...`, E44)
#   ameise_vorlagen.stammdaten — Vorlagenname für Stammdaten-Import inkl. Bildern
#
# Crop-Profile und Pose-Sortierung (NEU mit E45, Defaults bei null):
#   category                — Informativ. Werte: "fashion" | "tech"
#                              Default: "fashion" (häufigster Fall im Pilot)
#   crop_profile            — Auswahl der Bildverarbeitungsparameter
#                              Werte: "fashion" (2:3, 1000×1500, top_bias 0.3)
#                                     "tech"    (1:1, 1200×1200, top_bias 0.0)
#                              Default: "fashion"
#   pose_sort               — Strategie für Bild-Reihenfolge
#                              Werte: "auto_vision"        (Cowork-Vision klassifiziert,
#                                                            sortiert Hero/Back/Side/...)
#                                     "manufacturer_order" (Hersteller-Reihenfolge ist
#                                                            verlässlich, z.B. semantische
#                                                            URL-Namen wie _1_front.jpg)
#                                     "none"               (zufällig, OK für tech)
#                              Default: "auto_vision" für fashion, "none" für tech
#
# Stammdaten-Defaults (NEU v1.16, F3+F6):
#   article_weight_kg       — Default-Artikelgewicht in kg für Stammdaten-CSV
#                              Spalten `Artikelgewicht` und `Versandgewicht`.
#                              Pilot-Default Pole-Bekleidung: 0.05 (50 g pro
#                              Kleidungsstück). Pro Artikel ggf. override wenn
#                              echtes Gewicht aus Lieferanten-Daten bekannt.
#                              Wert bleibt in YAML als Float (0.05). In der
#                              CSV als DE-Locale-Komma `0,05` schreiben.
#                              Quelle: F3-Klärung Tjorben 2026-05-18 (B56).
#   taric_code              — TARIC-Code für deutsche Zoll-Anmeldung,
#                              landet in Stammdaten-CSV-Spalte `TARIC`
#                              (Sonstiges-Reiter in WaWi).
#                              Pilot-Default Pole-Bekleidung: '62114390'.
#                              YAML als String mit führender Null-Sicherheit
#                              quoten, sonst interpretiert YAML als Int.
#                              Quelle: F6-Klärung Tjorben 2026-05-18 (B59).
#
# Optional (Cowork läuft auch ohne):
#   fallback_retailer_url   — Wenn Hersteller-Site unvollständig
#   drive_ordner_id         — Lieferanten-Hauptordner (für Drive-Quellen)
#   drive_eingang_id        — _Eingang-Unterordner für manuelle Bild-Uploads
#   lieferantennummer_wawi  — WaWi-interne Lieferantennummer
#   groessen_konvention     — Lieferanten-spezifische Größen-Logik
#                              Werte: "standard" (jede Größe einzeln),
#                                     "kombi_reduziert_auf_kleinste" (XS/S→XS,
#                                       gemäß E27 für HotCakes etabliert)
#   max_groesse             — NEU v1.15. Optionales Default-Größen-Cap pro Lieferant.
#                              null = alle Größen aus Quell-Crawl übernehmen.
#                              Werte: "S" | "M" | "L" | "XL" | "XXL" | null
