    brand_story_de: |
      HotCakes Polewear ist die Geschichte von drei Frauen aus Griechenland,
      die sich beim Schneidern von Bühnen-Outfits kennen gelernt haben. Maro
      und Plousia tanzen Pole auf Bühnen, Thomis entwirft Mode. Was sie
      verbindet, ist ein Blick für das, was eine Tänzerin wirklich braucht,
      und der Mut, nichts dem Zufall zu überlassen. Aus zig Kostüm-Sessions
      für Performances wurde irgendwann die Idee einer eigenen Marke, die
      Polewear nicht als Sportartikel denkt, sondern als Stück deiner
      Persönlichkeit. „From a dancer's mind to a dancer's body" steht über
      allem, was hier entsteht. Wenn du HotCakes trägst, trägst du das, was
      drei Frauen für sich selbst entworfen hätten.
    brand_story_en: |
      HotCakes Polewear is the story of three women from Greece who met
      while sewing costumes for stage. Maro and Plousia dance pole on
      stage, Thomis designs fashion. What they share is an eye for what a
      dancer actually needs, and the refusal to leave anything to chance.
      Out of countless costume sessions for shows grew the idea of a brand
      that treats polewear not as sports gear but as a piece of who you
      are. „From a dancer's mind to a dancer's body" runs through
      everything made here. When you wear HotCakes, you wear what three
      women would have designed for themselves.
    brand_story_fr: |
      HotCakes Polewear, c'est l'histoire de trois femmes en Grèce qui se
      sont rencontrées en cousant des costumes de scène. Maro et Plousia
      dansent la pole sur scène, Thomis conçoit la mode. Ce qui les
      rassemble, c'est un œil pour ce dont une danseuse a vraiment besoin
      et le refus de laisser quoi que ce soit au hasard. De séances et de
      séances de costumes pour des spectacles est née l'idée d'une marque
      qui pense la polewear non comme équipement sportif mais comme un
      morceau de qui tu es. „From a dancer's mind to a dancer's body"
      traverse tout ce qui sort d'ici. Quand tu portes HotCakes, tu portes
      ce que trois femmes auraient dessiné pour elles-mêmes.
    brand_story_it: |
      HotCakes Polewear è la storia di tre donne in Grecia che si sono
      incontrate cucendo costumi per il palcoscenico. Maro e Plousia
      ballano pole sul palco, Thomis disegna moda. Quello che le unisce è
      un occhio per ciò di cui una ballerina ha davvero bisogno e il
      rifiuto di lasciare qualcosa al caso. Da innumerevoli sessioni di
      costumi per spettacoli è nata l'idea di un brand che pensa la
      polewear non come attrezzatura sportiva ma come un pezzo di chi sei.
      „From a dancer's mind to a dancer's body" attraversa tutto ciò che
      esce da qui. Quando indossi HotCakes, indossi ciò che tre donne
      avrebbero disegnato per se stesse.
    brand_story_es: |
      HotCakes Polewear es la historia de tres mujeres en Grecia que se
      conocieron cosiendo trajes para el escenario. Maro y Plousia bailan
      pole en el escenario, Thomis diseña moda. Lo que las une es un ojo
      para lo que una bailarina realmente necesita, y la negativa a dejar
      algo al azar. De incontables sesiones de costura de trajes para
      espectáculos surgió la idea de una marca que entiende la polewear no
      como equipamiento deportivo sino como una parte de quién eres.
      „From a dancer's mind to a dancer's body" atraviesa todo lo que sale
      de aquí. Cuando llevas HotCakes, llevas lo que tres mujeres habrían
      diseñado para sí mismas.
