  HOTCAKES_POLEWEAR:
    anzeigename: "HotCakes Polewear"
    kuerzel: HOTCAKES
    hersteller: HotCakes Polewear
    marke_kurz: "HotCakes"      # NEU mit v1.12 — Kurzform für Artikelnamen (Goldstandard-Konvention E59). Hersteller-Spalte trägt die lange Form, Artikelname nutzt die kurze. Ohne dieses Feld muss Cowork raten — heute (2026-05-16) im Self-Check manuell korrigiert.
