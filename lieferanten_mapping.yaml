    brand_story_de: |
      Lunalae ist einer der ersten Namen, der fällt, wenn es ums Thema Pole
      Dance Kleidung geht. Aus der Leidenschaft zum Pole Dance wurde 2016 die
      australische Marke Luna Pole Wear gegründet. Nach dem großen Erfolg im
      Bereich der Pole Dance Kleidung expandierte Luna Pole Wear und bietet
      mit der Marke LUNALAE inzwischen auch Freizeitbekleidung, Sportbekleidung
      und Unterwäsche an. Lunalae verarbeitet hochwertige Materialien, die
      sich wie eine zweite Haut an den Körper schmiegen. Dabei stärken die
      kreativen Schnitte das Selbstvertrauen ihrer Trägerinnen. Fühle dich
      sinnlich und leicht mit den einzigartigen Designs von Lunalae.
    brand_story_en: |
      Lunalae is one of the first names that comes to mind when it comes to
      pole dance wear. Born from a passion for pole dance, the Australian
      brand Luna Pole Wear was founded in 2016. After great success in pole
      dance wear, Luna Pole Wear expanded and, under the LUNALAE label, now
      also offers leisurewear, activewear and lingerie. Lunalae works with
      high-quality materials that hug the body like a second skin, while
      creative cuts strengthen the confidence of those who wear them. Feel
      sensual and light in the unique designs of Lunalae.
    brand_story_fr: |
      Lunalae est l'un des premiers noms qui vient à l'esprit quand on parle
      de vêtements de pole dance. Née d'une passion pour la pole dance, la
      marque australienne Luna Pole Wear a été fondée en 2016. Après un grand
      succès dans la pole dance, Luna Pole Wear s'est développée et propose
      désormais, sous la marque LUNALAE, des vêtements de loisirs, de sport et
      de la lingerie. Lunalae travaille des matières de qualité qui épousent
      le corps comme une seconde peau, tandis que des coupes créatives
      renforcent la confiance de celles qui les portent. Sens-toi sensuelle et
      légère dans les designs uniques de Lunalae.
    brand_story_it: |
      Lunalae è uno dei primi nomi che vengono in mente quando si parla di
      abbigliamento da pole dance. Nata dalla passione per la pole dance, nel
      2016 è stato fondato il marchio australiano Luna Pole Wear. Dopo il
      grande successo nell'abbigliamento da pole dance, Luna Pole Wear si è
      ampliata e oggi, con il marchio LUNALAE, offre anche abbigliamento per
      il tempo libero, sportivo e intimo. Lunalae lavora materiali di alta
      qualità che avvolgono il corpo come una seconda pelle, mentre tagli
      creativi rafforzano la sicurezza di chi li indossa. Sentiti sensuale e
      leggera nei design unici di Lunalae.
    brand_story_es: |
      Lunalae es uno de los primeros nombres que vienen a la mente cuando se
      habla de ropa de pole dance. Nacida de la pasión por el pole dance, en
      2016 se fundó la marca australiana Luna Pole Wear. Tras el gran éxito en
      la ropa de pole dance, Luna Pole Wear se expandió y hoy, bajo la marca
      LUNALAE, ofrece también ropa de ocio, ropa deportiva y lencería. Lunalae
      trabaja materiales de alta calidad que se ajustan al cuerpo como una
      segunda piel, mientras que los cortes creativos refuerzan la confianza
      de quienes los llevan. Siéntete sensual y ligera con los diseños únicos
      de Lunalae.
